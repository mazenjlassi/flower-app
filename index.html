<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>heey · MONTAAAA | mathematical flower</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a0c17 0%, #0a0512 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 20px;
    }

    /* soft floating glow */
    .glow-mist {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow-mist::before,
    .glow-mist::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 160, 180, 0.2) 0%, transparent 55%),
                  radial-gradient(circle at 75% 65%, rgba(255, 210, 150, 0.18) 0%, transparent 60%);
      animation: breatheSoft 16s infinite alternate ease-in-out;
    }
    .glow-mist::after {
      background: radial-gradient(circle at 65% 25%, rgba(230, 140, 190, 0.12) 0%, transparent 65%);
      animation: breatheSoft 20s infinite alternate-reverse;
    }
    @keyframes breatheSoft {
      0% { opacity: 0.4; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.06); }
    }

    .dust-sky {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .dustie {
      position: absolute;
      background: radial-gradient(circle, #FFDDC5, #FFB0BE);
      border-radius: 50%;
      animation: floatUpSlow linear infinite;
      opacity: 0;
    }
    @keyframes floatUpSlow {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      20% { opacity: 0.5; }
      80% { opacity: 0.35; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    .sweet-container {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
    }

    canvas {
      position: relative;
      display: block;
      margin: 0 auto;
      width: 85vw;
      height: 85vw;
      max-width: 360px;
      max-height: 360px;
      border-radius: 50%;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    canvas:active {
      transform: scale(0.98);
    }

    .hey-message {
      text-align: center;
      margin-top: 24px;
      z-index: 12;
      width: 100%;
      animation: messageFadeIn 1.4s ease-out forwards;
    }
    @keyframes messageFadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .hey-big {
      font-size: clamp(2.4rem, 10vw, 3.5rem);
      font-weight: 800;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', cursive;
      background: linear-gradient(125deg, #FFE0C0, #FFB0C0, #FFD3A5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      text-shadow: 0 0 18px rgba(255, 140, 110, 0.5);
      animation: textPop 2s infinite alternate;
      display: inline-block;
      padding: 0 6px;
    }
    .sweet-sub {
      font-size: 0.8rem;
      font-weight: 400;
      color: #FFD9C4;
      margin-top: 8px;
      letter-spacing: 2px;
      background: rgba(20, 8, 18, 0.4);
      backdrop-filter: blur(6px);
      display: inline-block;
      padding: 6px 18px;
      border-radius: 60px;
    }
    
    @keyframes textPop {
      0% { text-shadow: 0 0 4px rgba(255, 170, 130, 0.5); letter-spacing: 2px; }
      100% { text-shadow: 0 0 18px rgba(255, 150, 100, 0.9); letter-spacing: 3px; }
    }
    
    .touch-ripple {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 140, 0.6) 0%, rgba(255, 120, 90, 0) 70%);
      transform: scale(0);
      animation: rippleFade 0.65s ease-out forwards;
      pointer-events: none;
      z-index: 200;
    }
    @keyframes rippleFade {
      0% { transform: scale(0); opacity: 0.7; }
      100% { transform: scale(3.5); opacity: 0; }
    }
    
    .micro-bloom {
      position: fixed;
      pointer-events: none;
      z-index: 180;
      filter: blur(0.4px);
    }
    
    @media (max-width: 550px) {
      body { padding: 12px; }
      canvas { width: 82vw; height: 82vw; max-width: 300px; max-height: 300px; }
      .hey-big { letter-spacing: 2px; }
      .sweet-sub { font-size: 0.7rem; }
    }
    
    .tiny-grace {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      color: rgba(255, 190, 160, 0.5);
      z-index: 12;
      font-weight: 300;
      letter-spacing: 1px;
      animation: fadeSlideUp 2s ease-out forwards;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="glow-mist"></div>
<div class="dust-sky" id="dustField"></div>

<div class="sweet-container">
  <canvas id="flowerCanvas" width="600" height="600"></canvas>
  <div class="hey-message">
    <div class="hey-big">heey MONTAAAA🌸</div>
    <div class="sweet-sub">you make everything bloom</div>
  </div>
  <div class="tiny-grace">✦ tap the flower ✦</div>
</div>

<script>
  (function mathematicalFlower() {
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');
    let width = 600, height = 600;
    let animationProgress = 0; // 0 to 1 bloom progression
    let animationStart = null;
    let timeOffset = 0;
    let centerGlowIntensity = 0;
    
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const size = rect.width;
      canvas.width = size;
      canvas.height = size;
      width = size;
      height = size;
      draw();
    }
    
    window.addEventListener('resize', () => { resizeCanvas(); draw(); });
    
    // mathematical parameters for a exquisite rose/flower
    // using parametric equations: r(θ) = a + b * cos(nθ) with petal modulation
    
    function petalRadius(theta, petalCount, bloomFactor) {
      // bloomFactor: 0 = closed bud, 1 = fully open
      const a = 0.38;           // base radius (normalized)
      const b = 0.28;          // petal amplitude
      const n = petalCount / 2; // frequency
      // add twist and wave for realism
      const twist = Math.sin(theta * 3) * 0.03 * bloomFactor;
      const rBase = a + b * Math.cos(n * theta) + twist;
      // additional smaller harmonics for texture
      const rFine = Math.sin(theta * 12) * 0.02 * bloomFactor;
      let r = rBase + rFine;
      // bloom openness: petals expand outward as bloom progresses
      r = r * (0.65 + bloomFactor * 0.45);
      // add slight asymmetry for organic feel
      r = r * (1 + Math.sin(theta * 5) * 0.01);
      return Math.min(0.92, Math.max(0.08, r));
    }
    
    // inner spiral core (mathematical golden ratio spiral)
    function drawCenter(ctx, cx, cy, size, bloomFactor, time) {
      const maxRadius = size * 0.18 * (0.7 + bloomFactor * 0.5);
      const pulse = 0.95 + Math.sin(time * 8) * 0.03;
      
      // golden spiral dots
      const spirals = 180;
      for (let i = 0; i < spirals; i++) {
        const t = i / spirals; // 0..1
        const angle = t * Math.PI * 8; // multiple rotations
        const r = maxRadius * Math.pow(t, 0.85) * (0.6 + bloomFactor * 0.5);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, r * 0.8);
        gradient.addColorStop(0, `rgba(255, 225, 140, ${0.8 + Math.sin(angle * 5) * 0.2})`);
        gradient.addColorStop(1, `rgba(210, 120, 40, 0.7)`);
        ctx.beginPath();
        ctx.arc(x, y, r * 0.12 * (0.5 + t * 0.8), 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
      
      // center gem
      const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 0.7);
      centerGrad.addColorStop(0, '#FFE8B0');
      centerGrad.addColorStop(0.5, '#FDBC5A');
      centerGrad.addColorStop(1, '#C45D18');
      ctx.beginPath();
      ctx.arc(cx, cy, maxRadius * 0.55 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = centerGrad;
      ctx.fill();
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#FFB347';
      
      // tiny sparkle dots
      for (let i = 0; i < 24; i++) {
        const ang = (i / 24) * Math.PI * 2 + time;
        const rad = maxRadius * 0.7;
        const x = cx + Math.cos(ang) * rad;
        const y = cy + Math.sin(ang) * rad;
        ctx.beginPath();
        ctx.arc(x, y, maxRadius * 0.07, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 210, 100, ${0.6 + Math.sin(time * 12 + i) * 0.3})`;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
    
    // draw a single petal using parametric curves
    function drawPetal(ctx, cx, cy, angle, rInner, rOuter, bloomFactor, index, totalPetals, time) {
      const petalAngle = angle;
      const tipAngle = angle;
      
      // petal shape based on superellipse + bezier
      const petalLength = rOuter * (0.85 + bloomFactor * 0.2);
      const petalWidth = rOuter * 0.48 * (0.7 + Math.sin(angle * 3) * 0.1);
      
      // dynamic offset for organic wave
      const waveX = Math.sin(angle * 5 + time) * 2 * bloomFactor;
      const waveY = Math.cos(angle * 4 + time * 1.3) * 1.5 * bloomFactor;
      
      const tipX = cx + Math.cos(tipAngle) * petalLength + waveX;
      const tipY = cy + Math.sin(tipAngle) * petalLength + waveY;
      
      // left and right control points
      const perpAngle = angle + Math.PI / 2;
      const leftCtrlX = cx + Math.cos(angle) * (petalLength * 0.5) + Math.cos(perpAngle) * petalWidth + waveX * 0.5;
      const leftCtrlY = cy + Math.sin(angle) * (petalLength * 0.5) + Math.sin(perpAngle) * petalWidth + waveY * 0.5;
      const rightCtrlX = cx + Math.cos(angle) * (petalLength * 0.5) - Math.cos(perpAngle) * petalWidth + waveX * 0.5;
      const rightCtrlY = cy + Math.sin(angle) * (petalLength * 0.5) - Math.sin(perpAngle) * petalWidth + waveY * 0.5;
      
      // base of petal (inner)
      const baseX = cx + Math.cos(angle) * rInner * 0.9;
      const baseY = cy + Math.sin(angle) * rInner * 0.9;
      
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.quadraticCurveTo(leftCtrlX, leftCtrlY, tipX, tipY);
      ctx.quadraticCurveTo(rightCtrlX, rightCtrlY, baseX, baseY);
      ctx.closePath();
      
      // gradient fill: rich pink/red with bloom intensity
      const grad = ctx.createLinearGradient(baseX, baseY, tipX, tipY);
      const intensity = 0.5 + bloomFactor * 0.5;
      const rColor = 255 - Math.floor(60 * (1 - bloomFactor));
      const gColor = 120 + Math.floor(70 * bloomFactor);
      const bColor = 100 + Math.floor(60 * bloomFactor);
      grad.addColorStop(0, `rgba(255, ${120 + 40 * bloomFactor}, ${130 + 30 * bloomFactor}, 1)`);
      grad.addColorStop(0.6, `rgba(220, 60, 90, 1)`);
      grad.addColorStop(1, `rgba(160, 30, 65, 1)`);
      
      ctx.fillStyle = grad;
      ctx.fill();
      
      // add subtle vein lines (mathematical)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      const midX = cx + Math.cos(angle) * (petalLength * 0.6);
      const midY = cy + Math.sin(angle) * (petalLength * 0.6);
      ctx.lineTo(midX, midY);
      ctx.lineTo(tipX, tipY);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = `rgba(255, 200, 150, ${0.2 + bloomFactor * 0.3})`;
      ctx.stroke();
      ctx.restore();
      
      // edge highlight shimmer
      ctx.shadowBlur = 4;
      ctx.shadowColor = `rgba(255, 120, 100, ${0.3 * bloomFactor})`;
      ctx.strokeStyle = `rgba(255, 200, 170, 0.25)`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    // draw outer decorative filaments (stamen-like)
    function drawFilaments(ctx, cx, cy, maxR, bloomFactor, time, petalCount) {
      const filamentCount = 32;
      for (let i = 0; i < filamentCount; i++) {
        const angle = (i / filamentCount) * Math.PI * 2 + time * 0.5;
        const rBase = maxR * (0.55 + bloomFactor * 0.15);
        const rTip = maxR * (0.95 + Math.sin(angle * 5) * 0.05);
        const x1 = cx + Math.cos(angle) * rBase;
        const y1 = cy + Math.sin(angle) * rBase;
        const x2 = cx + Math.cos(angle + 0.08) * rTip;
        const y2 = cy + Math.sin(angle + 0.08) * rTip;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = `rgba(255, 180, 100, ${0.25 + Math.sin(angle * 8 + time) * 0.1})`;
        ctx.stroke();
        
        // tiny dot at tip
        ctx.beginPath();
        ctx.arc(x2, y2, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 210, 90, 0.7)`;
        ctx.fill();
      }
    }
    
    let frame = 0;
    let bloomStart = null;
    let isBlooming = true;
    
    function animateBloom(timestamp) {
      if (!bloomStart) bloomStart = timestamp;
      const elapsed = (timestamp - bloomStart) / 1000;
      if (isBlooming) {
        animationProgress = Math.min(1, elapsed / 1.8); // 1.8 sec full bloom
        if (animationProgress >= 1) isBlooming = false;
      }
      timeOffset = timestamp / 380;
      centerGlowIntensity = 0.5 + Math.sin(timestamp / 400) * 0.2;
      draw();
      requestAnimationFrame(animateBloom);
    }
    
    function draw() {
      if (!ctx) return;
      const size = width;
      const cx = size / 2;
      const cy = size / 2;
      const maxRadius = size * 0.42;
      
      ctx.clearRect(0, 0, size, size);
      
      // background glow inside canvas
      const radialGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 1.2);
      radialGrad.addColorStop(0, `rgba(40, 18, 35, 0.3)`);
      radialGrad.addColorStop(1, `rgba(10, 5, 15, 0.9)`);
      ctx.fillStyle = radialGrad;
      ctx.fillRect(0, 0, size, size);
      
      const petalCount = 18; // mathematical golden angle relation
      
      // draw petals from back to front (two layers for depth)
      // back layer (slightly darker, offset)
      for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2 + 0.12;
        const rInner = maxRadius * 0.22;
        const rOuter = maxRadius * petalRadius(angle, petalCount, animationProgress);
        ctx.save();
        drawPetal(ctx, cx, cy, angle, rInner, rOuter, animationProgress * 0.9, i, petalCount, timeOffset);
        ctx.restore();
      }
      
      // main petal layer
      for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2;
        const rInner = maxRadius * 0.2;
        const rOuter = maxRadius * petalRadius(angle, petalCount, animationProgress);
        ctx.save();
        drawPetal(ctx, cx, cy, angle, rInner, rOuter, animationProgress, i, petalCount, timeOffset);
        ctx.restore();
      }
      
      // additional in-between petals for lushness (math: interpolated angles)
      const interCount = 12;
      for (let i = 0; i < interCount; i++) {
        const angle = (i / interCount) * Math.PI * 2 + Math.PI / petalCount;
        const rInner = maxRadius * 0.21;
        let rOuter = maxRadius * (0.68 + Math.cos(angle * 6) * 0.08) * (0.7 + animationProgress * 0.45);
        rOuter = Math.min(maxRadius * 0.88, rOuter);
        ctx.save();
        drawPetal(ctx, cx, cy, angle, rInner, rOuter, animationProgress * 0.85, i, interCount, timeOffset);
        ctx.restore();
      }
      
      // draw delicate stamens/filaments
      drawFilaments(ctx, cx, cy, maxRadius * 0.78, animationProgress, timeOffset, petalCount);
      
      // magical center spiral + golden ratio core
      drawCenter(ctx, cx, cy, maxRadius * 0.7, animationProgress, timeOffset);
      
      // add petal tip sparkles (floating particles)
      for (let i = 0; i < 40; i++) {
        const angleSpark = (i * 37.5) * Math.PI / 180 + timeOffset * 2;
        const rSpark = maxRadius * (0.82 + Math.sin(angleSpark * 5) * 0.08);
        const xSpark = cx + Math.cos(angleSpark) * rSpark;
        const ySpark = cy + Math.sin(angleSpark) * rSpark;
        ctx.beginPath();
        ctx.arc(xSpark, ySpark, 1.2 + Math.sin(timeOffset * 10 + i) * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 190, 100, ${0.4 + Math.sin(timeOffset * 12 + i) * 0.2})`;
        ctx.fill();
      }
      
      // overall bloom glow effect
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'source-over';
      const glowAmount = 0.25 + animationProgress * 0.3;
      ctx.beginPath();
      ctx.arc(cx, cy, maxRadius * 0.65, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 130, 100, ${glowAmount * 0.12})`;
      ctx.fill();
    }
    
    // floating heey text and interactive magic on tap
    function createRippleTouch(x, y, color = "#FFD4A5") {
      const rippleDiv = document.createElement("div");
      rippleDiv.className = "touch-ripple";
      rippleDiv.style.left = x - 25 + "px";
      rippleDiv.style.top = y - 25 + "px";
      rippleDiv.style.width = "50px";
      rippleDiv.style.height = "50px";
      rippleDiv.style.background = `radial-gradient(circle, ${color} 0%, rgba(255,130,90,0) 75%)`;
      document.body.appendChild(rippleDiv);
      setTimeout(() => { if (rippleDiv && rippleDiv.remove) rippleDiv.remove(); }, 700);
    }
    
    function burstHeartsAndStars(x, y) {
      const icons = ["❤️", "🌸", "✨", "💖", "🌼", "🌺", "⭐"];
      for (let i = 0; i < 24; i++) {
        const charm = document.createElement("div");
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        charm.innerHTML = randomIcon;
        charm.style.position = "fixed";
        charm.style.left = x + "px";
        charm.style.top = y + "px";
        charm.style.fontSize = (12 + Math.random() * 16) + "px";
        charm.style.pointerEvents = "none";
        charm.style.zIndex = "210";
        charm.style.opacity = "0.9";
        charm.style.filter = "drop-shadow(0 0 3px #FFBC8C)";
        document.body.appendChild(charm);
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.8 + Math.random() * 6.5;
        let vx = Math.cos(angle) * speed;
        let vy = Math.sin(angle) * speed - 1.5;
        let posX = x, posY = y;
        let life = 1.0;
        let rot = Math.random() * 360;
        function flyCharm() {
          if (life <= 0.02 || posY < -60 || posX > window.innerWidth + 100 || posX < -100) {
            if (charm.parentNode) charm.remove();
            return;
          }
          posX += vx;
          posY += vy;
          vy += 0.1;
          life -= 0.017;
          rot += 8;
          charm.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${rot}deg)`;
          charm.style.opacity = life * 0.9;
          requestAnimationFrame(flyCharm);
        }
        requestAnimationFrame(flyCharm);
        setTimeout(() => { if (charm.parentNode) charm.remove(); }, 1600);
      }
    }
    
    function floatingHeeyText(x, y) {
      const wordDiv = document.createElement("div");
      const greetings = ["heey ✨", "💕 MONTAAAA!", "sweet you", "🌸 lovely", "heey 💖"];
      wordDiv.innerText = greetings[Math.floor(Math.random() * greetings.length)];
      wordDiv.style.position = "fixed";
      wordDiv.style.left = x + "px";
      wordDiv.style.top = y + "px";
      wordDiv.style.fontSize = "1.5rem";
      wordDiv.style.fontWeight = "bold";
      wordDiv.style.fontFamily = "'Segoe UI', 'Poppins', cursive";
      wordDiv.style.background = "linear-gradient(125deg, #FFE2BC, #FFBACB)";
      wordDiv.style.webkitBackgroundClip = "text";
      wordDiv.style.backgroundClip = "text";
      wordDiv.style.color = "transparent";
      wordDiv.style.whiteSpace = "nowrap";
      wordDiv.style.pointerEvents = "none";
      wordDiv.style.zIndex = "250";
      wordDiv.style.textShadow = "0 0 12px #FFB080";
      document.body.appendChild(wordDiv);
      let offsetY = 0;
      let opacityVal = 1;
      function riseSweet() {
        offsetY -= 1.8;
        opacityVal -= 0.018;
        if (opacityVal <= 0) {
          if (wordDiv.parentNode) wordDiv.remove();
          return;
        }
        wordDiv.style.transform = `translate(${0}px, ${offsetY}px) scale(${1 + offsetY * 0.008})`;
        wordDiv.style.opacity = opacityVal;
        requestAnimationFrame(riseSweet);
      }
      requestAnimationFrame(riseSweet);
      setTimeout(() => { if (wordDiv.parentNode) wordDiv.remove(); }, 1200);
    }
    
    function miniPetalSprinkle(x, y) {
      for (let i = 0; i < 14; i++) {
        const petalPiece = document.createElement("div");
        petalPiece.className = "micro-bloom";
        petalPiece.style.width = "9px";
        petalPiece.style.height = "11px";
        petalPiece.style.background = `radial-gradient(circle, #FFAABA, #F8557F)`;
        petalPiece.style.borderRadius = "70% 30% 60% 40% / 55% 45% 55% 45%";
        petalPiece.style.left = x + "px";
        petalPiece.style.top = y + "px";
        petalPiece.style.boxShadow = "0 0 5px #FFA57A";
        document.body.appendChild(petalPiece);
        const angle = Math.random() * Math.PI * 2;
        const velocity = 1.4 + Math.random() * 5;
        let dx = Math.cos(angle) * velocity;
        let dy = Math.sin(angle) * velocity - 1.2;
        let posX = 0, posY = 0;
        let life = 1;
        let rotSpiral = Math.random() * 25;
        function flyPiece() {
          posX += dx;
          posY += dy;
          dy += 0.1;
          life -= 0.023;
          if (life <= 0 || posY > 280 || Math.abs(posX) > 260) {
            if (petalPiece.parentNode) petalPiece.remove();
            return;
          }
          petalPiece.style.transform = `translate(${posX}px, ${posY}px) rotate(${rotSpiral + posX}deg)`;
          petalPiece.style.opacity = life * 0.8;
          requestAnimationFrame(flyPiece);
        }
        requestAnimationFrame(flyPiece);
        setTimeout(() => { if (petalPiece.parentNode) petalPiece.remove(); }, 1000);
      }
    }
    
    // canvas click interaction
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const canvasX = (e.clientX - rect.left) * scaleX;
      const canvasY = (e.clientY - rect.top) * scaleY;
      const centerX = e.clientX;
      const centerY = e.clientY;
      createRippleTouch(centerX, centerY, "#FFCFA5");
      burstHeartsAndStars(centerX, centerY);
      floatingHeeyText(centerX, centerY);
      miniPetalSprinkle(centerX, centerY);
      
      const heyBig = document.querySelector(".hey-big");
      heyBig.style.animation = "none";
      heyBig.style.transform = "scale(1.1)";
      setTimeout(() => {
        heyBig.style.animation = "textPop 2s infinite alternate";
        heyBig.style.transform = "";
      }, 220);
      const subElem = document.querySelector(".sweet-sub");
      const originalSub = subElem.innerText;
      subElem.innerText = "💕  heey gorgeous  💕";
      setTimeout(() => { subElem.innerText = originalSub; }, 1200);
    });
    
    function initDustField() {
      const dustContainer = document.getElementById("dustField");
      if (!dustContainer) return;
      const dustCount = 55;
      for (let i = 0; i < dustCount; i++) {
        const dust = document.createElement("div");
        dust.classList.add("dustie");
        const size = 2 + Math.random() * 5;
        dust.style.width = size + "px";
        dust.style.height = size + "px";
        dust.style.left = Math.random() * 100 + "%";
        dust.style.animationDuration = 4 + Math.random() * 15 + "s";
        dust.style.animationDelay = Math.random() * 12 + "s";
        dust.style.opacity = 0.2 + Math.random() * 0.45;
        dust.style.background = `radial-gradient(circle, #FFCFB5, #FFA7B8)`;
        dustContainer.appendChild(dust);
      }
      setInterval(() => {
        if (document.hidden) return;
        const driftHeart = document.createElement("div");
        driftHeart.innerHTML = "✧";
        driftHeart.style.position = "fixed";
        driftHeart.style.left = Math.random() * 100 + "%";
        driftHeart.style.bottom = "-15px";
        driftHeart.style.fontSize = "12px";
        driftHeart.style.color = `rgba(255, 190, 165, 0.5)`;
        driftHeart.style.pointerEvents = "none";
        driftHeart.style.zIndex = "3";
        driftHeart.style.animation = `floatGentle 10s linear forwards`;
        driftHeart.style.opacity = "0.5";
        document.body.appendChild(driftHeart);
        setTimeout(() => driftHeart.remove(), 10000);
      }, 3400);
    }
    
    const styleFloat = document.createElement('style');
    styleFloat.textContent = `@keyframes floatGentle { 0% { transform: translateY(0) rotate(0deg); opacity: 0.3; } 100% { transform: translateY(-100vh) rotate(12deg); opacity: 0; } }`;
    document.head.appendChild(styleFloat);
    
    resizeCanvas();
    initDustField();
    requestAnimationFrame(animateBloom);
  })();
</script>
</body>
</html>
