<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flower Animation</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .flower {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .petal {
      position: absolute;
      width: 100px;
      height: 100px;
      background: pink;
      border-radius: 50%;
      transform-origin: bottom right;
      opacity: 0;
      animation: bloom 2s forwards;
    }

    .center {
      position: absolute;
      width: 60px;
      height: 60px;
      background: yellow;
      border-radius: 50%;
      top: 70px;
      left: 70px;
      z-index: 2;
    }

    @keyframes bloom {
      from {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }
      to {
        transform: scale(1) rotate(var(--angle));
        opacity: 1;
      }
    }
  </style>
</head>
<body>

<div class="flower" id="flower"></div>

<script>
  const flower = document.getElementById("flower");
  const petalCount = 10;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement("div");
    petal.className = "petal";

    const angle = (360 / petalCount) * i;
    petal.style.setProperty('--angle', angle + 'deg');

    petal.style.top = "50px";
    petal.style.left = "50px";

    flower.appendChild(petal);
  }

  const center = document.createElement("div");
  center.className = "center";
  flower.appendChild(center);
</script>

</body>
</html>
