<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>heey | sweet bloom</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 40% 50%, #1F1224, #0B0710);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Inter', sans-serif;
      overflow: hidden;
      cursor: default;
      position: relative;
    }

    /* dreamy animated soft glow orbs */
    .ambient-light {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .ambient-light::before,
    .ambient-light::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 25% 35%, rgba(255, 160, 190, 0.2) 0%, transparent 55%),
                  radial-gradient(circle at 75% 70%, rgba(255, 210, 150, 0.18) 0%, transparent 60%);
      animation: slowDrift 18s infinite alternate ease-in-out;
    }
    .ambient-light::after {
      background: radial-gradient(circle at 60% 30%, rgba(210, 130, 200, 0.15) 0%, transparent 65%);
      animation: slowDrift 22s infinite alternate-reverse;
    }
    @keyframes slowDrift {
      0% { opacity: 0.4; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.08); }
    }

    /* floating sparkle dust */
    .dust-field {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .dust-particle {
      position: absolute;
      background: radial-gradient(circle, #FFDDC0, #FFA5B0);
      border-radius: 50%;
      animation: floatParticle linear infinite;
      opacity: 0;
      filter: blur(0.4px);
    }
    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: 0.5; }
      85% { opacity: 0.4; }
      100% {
        transform: translateY(-25vh) rotate(180deg);
        opacity: 0;
      }
    }

    /* main card container */
    .card {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(1px);
    }

    /* flower wrapper with gentle lift */
    .flower-garden {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.35s cubic-bezier(0.2, 0.85, 0.4, 1.1);
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.4));
    }
    .flower-garden:hover {
      transform: scale(1.01);
    }

    /* flower container */
    .flower {
      position: relative;
      width: 270px;
      height: 270px;
    }

    /* new PETAL STYLE: softer, candy-like, warmer */
    .petal {
      position: absolute;
      width: 125px;
      height: 135px;
      border-radius: 72% 28% 65% 35% / 58% 45% 55% 42%;
      transform-origin: bottom right;
      opacity: 0;
      background: radial-gradient(ellipse at 32% 28%, 
        #FFB7C5, 
        #FF8AAE 35%,
        #E9547A 70%,
        #B32D55);
      box-shadow: 
        0 10px 18px rgba(0, 0, 0, 0.25),
        inset 0 1px 8px rgba(255, 245, 210, 0.6),
        0 0 16px rgba(255, 110, 140, 0.5);
      transition: all 0.2s ease;
      animation: bloomSweet 0.95s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
    }
    
    /* variation for organic charm */
    .petal:nth-child(3n+1) {
      border-radius: 60% 40% 68% 32% / 52% 48% 52% 48%;
    }
    .petal:nth-child(3n+2) {
      border-radius: 68% 32% 58% 42% / 48% 54% 46% 52%;
    }
    .petal:nth-child(5n) {
      background: radial-gradient(ellipse at 30% 35%, #FFC0D0, #FF779F, #D63E6A);
    }

    @keyframes bloomSweet {
      0% {
        transform: scale(0) rotate(-8deg);
        opacity: 0;
        filter: blur(12px);
      }
      35% { filter: blur(3px); }
      100% {
        transform: scale(1) rotate(var(--angle));
        opacity: 1;
        filter: blur(0);
      }
    }

    /* center: glowing honey-gold with a cute wink */
    .heart-center {
      position: absolute;
      width: 82px;
      height: 82px;
      top: 94px;
      left: 94px;
      border-radius: 50%;
      z-index: 18;
      background: radial-gradient(circle at 35% 30%, 
        #FFE3A4, 
        #FDBC5A 25%,
        #E58E2E 70%,
        #C2691A);
      box-shadow: 0 0 34px rgba(255, 190, 80, 0.9), 0 0 48px rgba(255, 140, 50, 0.5), inset 0 2px 8px rgba(255, 245, 190, 0.8);
      animation: softHeartbeat 2.8s ease-in-out infinite;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 400;
      color: rgba(255, 240, 150, 0.9);
      text-shadow: 0 0 3px #FFB347;
    }
    .heart-center:hover {
      transform: scale(1.04);
      box-shadow: 0 0 48px #FFCF8A;
    }
    
    /* little heart emoji spark */
    .heart-center::after {
      content: "💖";
      position: absolute;
      font-size: 22px;
      top: -18px;
      right: -12px;
      opacity: 0.7;
      filter: drop-shadow(0 0 4px #FFA07A);
      animation: floatingHeart 2.2s infinite alternate;
      pointer-events: none;
    }
    
    @keyframes softHeartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); box-shadow: 0 0 44px rgba(255, 190, 90, 1); }
    }
    
    @keyframes floatingHeart {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-5px) rotate(5deg); opacity: 1; }
    }

    /* Text area — friendly and sweet */
    .greeting {
      text-align: center;
      margin-top: 2rem;
      z-index: 12;
    }
    .hey-big {
      font-size: 3.2rem;
      font-weight: 700;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', cursive;
      background: linear-gradient(125deg, #FFDAC6, #FFB7C5, #FFD3A5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      text-shadow: 0 0 16px rgba(255, 160, 130, 0.6);
      animation: greetingGlow 2.2s infinite alternate;
      display: inline-block;
      backdrop-filter: blur(3px);
      padding: 0 12px;
      border-radius: 60px;
    }
    .sweet-tag {
      font-size: 0.85rem;
      font-weight: 400;
      color: #FFCFBB;
      margin-top: 8px;
      letter-spacing: 2px;
      background: rgba(25, 12, 22, 0.4);
      display: inline-block;
      padding: 6px 16px;
      border-radius: 60px;
      backdrop-filter: blur(5px);
    }
    
    @keyframes greetingGlow {
      0% { text-shadow: 0 0 4px rgba(255, 180, 140, 0.4); opacity: 0.95; }
      100% { text-shadow: 0 0 18px rgba(255, 170, 120, 0.9); opacity: 1; }
    }

    /* ripple & interactive fx */
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 205, 130, 0.7) 0%, rgba(255, 130, 100, 0) 70%);
      transform: scale(0);
      animation: rippleOut 0.7s ease-out forwards;
      pointer-events: none;
      z-index: 200;
    }
    @keyframes rippleOut {
      0% { transform: scale(0); opacity: 0.8; }
      100% { transform: scale(4.5); opacity: 0; }
    }
    
    /* cute micro petal bursts */
    .micro-petal {
      position: fixed;
      pointer-events: none;
      z-index: 180;
      filter: blur(0.6px);
    }
    
    /* responsiveness */
    @media (max-width: 550px) {
      .flower {
        width: 230px;
        height: 230px;
      }
      .heart-center {
        width: 70px;
        height: 70px;
        top: 80px;
        left: 80px;
        font-size: 28px;
      }
      .petal {
        width: 108px;
        height: 116px;
      }
      .flower-garden {
        width: 270px;
        height: 270px;
      }
      .hey-big {
        font-size: 2.6rem;
      }
    }
    
    /* extra sweetness: small signature */
    .tiny-note {
      position: absolute;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(255, 190, 170, 0.5);
      z-index: 12;
      font-style: normal;
      font-weight: 300;
    }
  </style>
</head>
<body>
<div class="ambient-light"></div>
<div class="dust-field" id="dustField"></div>

<div class="card">
  <div class="flower-garden">
    <div class="flower" id="sweetFlower"></div>
  </div>
  <div class="greeting">
    <div class="hey-big">heey ✿</div>
    <div class="sweet-tag">you make everything bloom</div>
  </div>
  <div class="tiny-note">✦ touch the center for magic ✦</div>
</div>

<script>
  (function initSweetFlower() {
    const flowerContainer = document.getElementById("sweetFlower");
    if (!flowerContainer) return;
    
    const petalCount = 16;    // full & lush
    // new style: each petal has unique rotation
    for (let i = 0; i < petalCount; i++) {
      const petal = document.createElement("div");
      petal.className = "petal";
      
      const angleStep = 360 / petalCount;
      const angle = angleStep * i;
      petal.style.setProperty('--angle', angle + 'deg');
      petal.style.top = "68px";
      petal.style.left = "68px";
      
      // staggered blooming (playful sequence)
      const delay = i * 0.07;
      petal.style.animationDelay = delay + "s";
      
      // extra flavor: some petals get additional size variation (organic)
      if (i % 4 === 2) {
        petal.style.width = "130px";
        petal.style.height = "138px";
      }
      if (i % 7 === 3) {
        petal.style.filter = "brightness(1.07) saturate(1.05)";
      }
      
      flowerContainer.appendChild(petal);
    }
    
    // create the center with "heey" vibe!
    const centerElement = document.createElement("div");
    centerElement.className = "heart-center";
    centerElement.innerHTML = "🌸";   // cherry blossom charm
    flowerContainer.appendChild(centerElement);
    
    // interactive: click center -> "heey" whisper + sparkle festival
    centerElement.addEventListener("click", (e) => {
      e.stopPropagation();
      const rect = centerElement.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      // magical ripple & bursts
      createRippleWave(centerX, centerY, "#FFCC99");
      launchConfettiHearts(centerX, centerY);
      createSweetWordPopup(centerX, centerY);
      
      // animated bounce on center + make "heey" greeting dance
      centerElement.style.transform = "scale(0.96)";
      setTimeout(() => { centerElement.style.transform = ""; }, 150);
      
      const heyElement = document.querySelector(".hey-big");
      heyElement.style.animation = "none";
      heyElement.style.transform = "scale(1.1)";
      heyElement.style.transition = "0.2s";
      setTimeout(() => {
        heyElement.style.animation = "greetingGlow 2.2s infinite alternate";
        heyElement.style.transform = "";
      }, 250);
      
      // flash extra message
      const tagline = document.querySelector(".sweet-tag");
      const originalText = tagline.innerText;
      tagline.innerText = "💕 heey gorgeous 💕";
      tagline.style.opacity = "0.9";
      setTimeout(() => {
        tagline.innerText = originalText;
      }, 1300);
    });
    
    // also click on flower wrapper yields tiny petals effect
    const wrapper = document.querySelector(".flower-garden");
    wrapper.addEventListener("click", (e) => {
      if (e.target === centerElement || centerElement.contains(e.target)) return;
      const clickX = e.clientX;
      const clickY = e.clientY;
      createRippleWave(clickX, clickY, "#FFC8A2");
      sendMiniPetalShower(clickX, clickY);
    });
    
  })();
  
  // ripple effect (refined)
  function createRippleWave(x, y, color = "#FFD0A0") {
    const ripple = document.createElement("div");
    ripple.className = "ripple-effect";
    ripple.style.left = x - 25 + "px";
    ripple.style.top = y - 25 + "px";
    ripple.style.width = "50px";
    ripple.style.height = "50px";
    ripple.style.background = `radial-gradient(circle, ${color} 0%, rgba(255,140,100,0) 75%)`;
    document.body.appendChild(ripple);
    setTimeout(() => {
      if (ripple && ripple.remove) ripple.remove();
    }, 700);
  }
  
  // floating hearts & sparkles (heey celebration)
  function launchConfettiHearts(x, y) {
    const colors = ["#FFB7C5", "#FFA0B0", "#FFD0A8", "#FFB089"];
    for (let i = 0; i < 22; i++) {
      const heartOrStar = document.createElement("div");
      const isHeart = Math.random() > 0.5;
      heartOrStar.innerHTML = isHeart ? "❤️" : "🌸";
      heartOrStar.style.position = "fixed";
      heartOrStar.style.left = x + "px";
      heartOrStar.style.top = y + "px";
      heartOrStar.style.fontSize = (12 + Math.random() * 14) + "px";
      heartOrStar.style.pointerEvents = "none";
      heartOrStar.style.zIndex = "210";
      heartOrStar.style.opacity = "0.9";
      heartOrStar.style.filter = "drop-shadow(0 0 3px #FFC0A0)";
      heartOrStar.style.transition = "all 0.05s linear";
      document.body.appendChild(heartOrStar);
      
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 7;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed - 1.8;
      let posX = x, posY = y;
      let life = 1.0;
      let rotation = 0;
      
      function flyHeart() {
        if (life <= 0.02 || posY < -80 || posX > window.innerWidth + 100 || posX < -100) {
          if (heartOrStar.parentNode) heartOrStar.remove();
          return;
        }
        posX += vx;
        posY += vy;
        vy += 0.1;
        life -= 0.016;
        rotation += 7;
        heartOrStar.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${rotation}deg)`;
        heartOrStar.style.opacity = life * 0.9;
        requestAnimationFrame(flyHeart);
      }
      requestAnimationFrame(flyHeart);
      setTimeout(() => {
        if (heartOrStar.parentNode) heartOrStar.remove();
      }, 1800);
    }
  }
  
  // create a floating "heey" text word bubble
  function createSweetWordPopup(x, y) {
    const word = document.createElement("div");
    const messages = ["heey ✨", "sweet!", "🌸 hey", "💕 lovely", "hey you ✿"];
    word.innerText = messages[Math.floor(Math.random() * messages.length)];
    word.style.position = "fixed";
    word.style.left = x + "px";
    word.style.top = y + "px";
    word.style.fontSize = "1.5rem";
    word.style.fontWeight = "bold";
    word.style.fontFamily = "'Segoe UI', 'Poppins', cursive";
    word.style.background = "linear-gradient(135deg, #FFE0B5, #FFB8C0)";
    word.style.webkitBackgroundClip = "text";
    word.style.backgroundClip = "text";
    word.style.color = "transparent";
    word.style.textShadow = "0 0 8px #FFAE8A";
    word.style.whiteSpace = "nowrap";
    word.style.pointerEvents = "none";
    word.style.zIndex = "250";
    word.style.opacity = "1";
    word.style.filter = "drop-shadow(0 2px 4px rgba(0,0,0,0.2))";
    document.body.appendChild(word);
    
    let offsetY = 0;
    let opacityVal = 1;
    function riseAndFade() {
      offsetY -= 1.6;
      opacityVal -= 0.018;
      if (opacityVal <= 0) {
        if (word.parentNode) word.remove();
        return;
      }
      word.style.transform = `translate(${0}px, ${offsetY}px) scale(${1 + offsetY * 0.008})`;
      word.style.opacity = opacityVal;
      requestAnimationFrame(riseAndFade);
    }
    requestAnimationFrame(riseAndFade);
    setTimeout(() => {
      if (word.parentNode) word.remove();
    }, 1300);
  }
  
  // mini petal shower for extra interactive sweetness
  function sendMiniPetalShower(x, y) {
    for (let i = 0; i < 14; i++) {
      const tinyPetal = document.createElement("div");
      tinyPetal.className = "micro-petal";
      tinyPetal.style.width = "10px";
      tinyPetal.style.height = "12px";
      tinyPetal.style.background = `radial-gradient(circle, #FFAABA, #E9557A)`;
      tinyPetal.style.borderRadius = "65% 35% 55% 45% / 58% 42% 58% 42%";
      tinyPetal.style.left = x + "px";
      tinyPetal.style.top = y + "px";
      tinyPetal.style.boxShadow = "0 0 4px #FFB080";
      document.body.appendChild(tinyPetal);
      
      const angle = Math.random() * Math.PI * 2;
      const velocity = 1.5 + Math.random() * 6;
      let dx = Math.cos(angle) * velocity;
      let dy = Math.sin(angle) * velocity - 1;
      let posX = 0, posY = 0;
      let lifetime = 1;
      let rotateDelta = Math.random() * 20;
      
      function flyPetal() {
        posX += dx;
        posY += dy;
        dy += 0.12;
        lifetime -= 0.022;
        if (lifetime <= 0 || posY > 300 || Math.abs(posX) > 280) {
          if (tinyPetal.parentNode) tinyPetal.remove();
          return;
        }
        tinyPetal.style.transform = `translate(${posX}px, ${posY}px) rotate(${rotateDelta + posX}deg)`;
        tinyPetal.style.opacity = lifetime * 0.8;
        requestAnimationFrame(flyPetal);
      }
      requestAnimationFrame(flyPetal);
      setTimeout(() => {
        if (tinyPetal.parentNode) tinyPetal.remove();
      }, 1200);
    }
  }
  
  // generate floating glitter dust background (dreamlike)
  function initDustField() {
    const dustContainer = document.getElementById("dustField");
    if (!dustContainer) return;
    const dustCount = 75;
    for (let i = 0; i < dustCount; i++) {
      const dust = document.createElement("div");
      dust.classList.add("dust-particle");
      const size = 2 + Math.random() * 6;
      dust.style.width = size + "px";
      dust.style.height = size + "px";
      dust.style.left = Math.random() * 100 + "%";
      dust.style.animationDuration = 5 + Math.random() * 18 + "s";
      dust.style.animationDelay = Math.random() * 14 + "s";
      dust.style.opacity = 0.2 + Math.random() * 0.5;
      dust.style.background = `radial-gradient(circle, #FFCBA4, #FFA5C0)`;
      dustContainer.appendChild(dust);
    }
    // also floating gentle "heey" whispers in console of love: micro floating emojis periodically
    setInterval(() => {
      if (document.hidden) return;
      const silentEmoji = document.createElement("div");
      silentEmoji.innerHTML = "✿";
      silentEmoji.style.position = "fixed";
      silentEmoji.style.left = Math.random() * 100 + "%";
      silentEmoji.style.bottom = "-15px";
      silentEmoji.style.fontSize = "12px";
      silentEmoji.style.color = `rgba(255, 190, 160, 0.5)`;
      silentEmoji.style.pointerEvents = "none";
      silentEmoji.style.zIndex = "3";
      silentEmoji.style.animation = `floatGentle ${9 + Math.random() * 8}s linear forwards`;
      silentEmoji.style.opacity = "0.5";
      document.body.appendChild(silentEmoji);
      setTimeout(() => silentEmoji.remove(), 10000);
    }, 3200);
  }
  
  // add gentle floating keyframes for emoji
  const addFloatKeyframes = () => {
    const style = document.createElement('style');
    style.textContent = `
      @keyframes floatGentle {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
        100% { transform: translateY(-100vh) rotate(12deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  };
  
  // auto-refresh petal shine periodically
  function shimmerPetalsRandomly() {
    setInterval(() => {
      const petals = document.querySelectorAll('.petal');
      if (!petals.length) return;
      const randomIndex = Math.floor(Math.random() * petals.length);
      const petal = petals[randomIndex];
      if (petal) {
        petal.style.filter = "brightness(1.18) drop-shadow(0 0 5px #FFAF90)";
        setTimeout(() => {
          if (petal) petal.style.filter = "";
        }, 380);
      }
    }, 1800);
  }
  
  // welcome effect: tiny heey on load
  window.addEventListener('load', () => {
    initDustField();
    addFloatKeyframes();
    shimmerPetalsRandomly();
    
    // optional: mild entrance "heey" burst from center after 0.3 sec
    setTimeout(() => {
      const center = document.querySelector('.heart-center');
      if (center) {
        const rect = center.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;
        createSweetWordPopup(x, y);
        createRippleWave(x, y, "#FFD9B0");
      }
    }, 400);
  });
</script>
</body>
</html>
