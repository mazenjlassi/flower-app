<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Flower</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #0f172a, #020617);
    overflow: hidden;
  }

  /* Floating particles */
  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveBg 20s linear infinite;
  }

  @keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-40px,-40px); }
  }

  .flower {
    position: relative;
    width: 250px;
    height: 250px;
  }

  .petal {
    position: absolute;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle at 30% 30%, #ff9ec4, #ff4d88);
    border-radius: 50%;
    transform-origin: bottom right;
    opacity: 0;
    filter: blur(0.5px);
    box-shadow: 0 0 20px rgba(255, 100, 150, 0.5);
    animation: bloom 1.5s forwards;
  }

  .center {
    position: absolute;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #fff176, #facc15);
    border-radius: 50%;
    top: 90px;
    left: 90px;
    z-index: 2;
    box-shadow: 0 0 25px rgba(255, 255, 100, 0.8);
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes bloom {
    0% {
      transform: scale(0) rotate(0deg);
      opacity: 0;
    }
    100% {
      transform: scale(1) rotate(var(--angle));
      opacity: 1;
    }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
</style>

</head>
<body>

<div class="flower" id="flower"></div>

<script>
  const flower = document.getElementById("flower");
  const petalCount = 12;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement("div");
    petal.className = "petal";

    const angle = (360 / petalCount) * i;
    petal.style.setProperty('--angle', angle + 'deg');

    petal.style.top = "65px";
    petal.style.left = "65px";

    // delay for smooth blooming effect
    petal.style.animationDelay = (i * 0.1) + "s";

    flower.appendChild(petal);
  }

  const center = document.createElement("div");
  center.className = "center";
  flower.appendChild(center);
</script>

</body>
</html>
