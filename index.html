<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>heey · MONTAAAA sweet flower</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a0c17 0%, #0a0512 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 20px;
    }

    /* soft floating glow */
    .glow-mist {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow-mist::before,
    .glow-mist::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 160, 180, 0.2) 0%, transparent 55%),
                  radial-gradient(circle at 75% 65%, rgba(255, 210, 150, 0.18) 0%, transparent 60%);
      animation: breatheSoft 16s infinite alternate ease-in-out;
    }
    .glow-mist::after {
      background: radial-gradient(circle at 65% 25%, rgba(230, 140, 190, 0.12) 0%, transparent 65%);
      animation: breatheSoft 20s infinite alternate-reverse;
    }
    @keyframes breatheSoft {
      0% { opacity: 0.4; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.06); }
    }

    /* floating tiny particles (mobile friendly perf) */
    .dust-sky {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .dustie {
      position: absolute;
      background: radial-gradient(circle, #FFDDC5, #FFB0BE);
      border-radius: 50%;
      animation: floatUpSlow linear infinite;
      opacity: 0;
    }
    @keyframes floatUpSlow {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      20% { opacity: 0.5; }
      80% { opacity: 0.35; }
      100% {
        transform: translateY(-20vh) scale(1);
        opacity: 0;
      }
    }

    /* main content */
    .sweet-container {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    /* flower holder */
    .flower-stage {
      position: relative;
      width: 86vw;
      max-width: 320px;
      height: 86vw;
      max-height: 320px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.25s ease;
    }
    .flower-stage:active {
      transform: scale(0.99);
    }

    .flower {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* REAL FLOWER ANIMATION - petals bloom organically like a time-lapse */
    .petal {
      position: absolute;
      width: 48%;
      height: 52%;
      border-radius: 75% 25% 65% 35% / 60% 45% 55% 40%;
      transform-origin: bottom right;
      opacity: 0;
      background: radial-gradient(ellipse at 32% 30%, 
        #FFB7C5, 
        #FF88AE 40%,
        #E64B74 75%,
        #B2224A);
      box-shadow: 
        0 8px 18px rgba(0, 0, 0, 0.2),
        inset 0 1px 6px rgba(255, 245, 210, 0.5),
        0 0 12px rgba(255, 90, 120, 0.4);
      transition: filter 0.2s;
      /* REALISTIC BLOOM: starts curled, slowly opens and rotates into final position */
      animation: realBloom 2.2s cubic-bezier(0.2, 0.85, 0.25, 1.1) forwards;
      will-change: transform, opacity;
    }
    
    /* organic variation */
    .petal:nth-child(odd) {
      border-radius: 68% 32% 72% 28% / 55% 48% 52% 45%;
    }
    .petal:nth-child(3n) {
      background: radial-gradient(ellipse at 35% 30%, #FFC0CF, #FF779F, #D63E6A);
      width: 47%;
      height: 53%;
    }
    
    /* REAL FLOWER BLOOM KEYFRAMES - starts closed/bud-like, expands outward */
    @keyframes realBloom {
      0% {
        transform: scale(0.15) rotate(calc(var(--angle) - 35deg));
        opacity: 0;
        filter: blur(12px);
        border-radius: 80% 20% 80% 20% / 50% 50% 50% 50%;
      }
      25% {
        opacity: 0.4;
        filter: blur(6px);
        transform: scale(0.4) rotate(calc(var(--angle) - 20deg));
      }
      50% {
        opacity: 0.7;
        filter: blur(3px);
        transform: scale(0.7) rotate(calc(var(--angle) - 10deg));
        border-radius: 75% 25% 70% 30% / 55% 45% 55% 45%;
      }
      75% {
        transform: scale(0.9) rotate(calc(var(--angle) - 3deg));
        filter: blur(1px);
      }
      100% {
        transform: scale(1) rotate(var(--angle));
        opacity: 1;
        filter: blur(0);
        border-radius: inherit;
      }
    }

    /* ✦ STARLIGHT CORE — delicate star-burst / gem */
    .starlight-core {
      position: absolute;
      width: 28%;
      height: 28%;
      top: 36%;
      left: 36%;
      z-index: 22;
      background: radial-gradient(circle at 35% 35%, 
        #FFECB3, 
        #FDBC5A 30%,
        #E5892A 75%,
        #C45D18);
      border-radius: 40% 60% 45% 55% / 55% 40% 60% 45%;
      box-shadow: 0 0 28px rgba(255, 190, 70, 0.9), 0 0 38px rgba(255, 130, 50, 0.5), inset 0 2px 10px rgba(255, 245, 180, 0.8);
      animation: centerReveal 2s ease-out forwards, gentleSpin 6s infinite alternate, softPulseGlow 2.6s ease-in-out infinite;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 8vw, 32px);
      backdrop-filter: blur(1px);
      transform: scale(0);
      opacity: 0;
    }
    
    /* center reveals after petals start opening */
    @keyframes centerReveal {
      0% {
        transform: scale(0) rotate(-15deg);
        opacity: 0;
      }
      60% {
        transform: scale(0.6) rotate(2deg);
        opacity: 0.6;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }
    
    /* inner spark ✨ */
    .starlight-core::before {
      content: "✨";
      position: absolute;
      font-size: 18px;
      top: -15%;
      right: -12%;
      opacity: 0.9;
      filter: drop-shadow(0 0 4px gold);
      animation: littleSpark 2s infinite alternate;
      pointer-events: none;
    }
    
    .starlight-core::after {
      content: "💫";
      position: absolute;
      font-size: 14px;
      bottom: -18%;
      left: -10%;
      opacity: 0.8;
      animation: littleSparkRev 2.4s infinite alternate;
      pointer-events: none;
    }
    
    @keyframes gentleSpin {
      0% { transform: rotate(0deg) scale(1); border-radius: 40% 60% 45% 55% / 55% 40% 60% 45%; }
      100% { transform: rotate(8deg) scale(1.02); border-radius: 50% 50% 45% 55% / 50% 45% 55% 50%; }
    }
    
    @keyframes softPulseGlow {
      0%, 100% { box-shadow: 0 0 20px #FFC285, 0 0 30px rgba(255, 150, 60, 0.6); }
      50% { box-shadow: 0 0 38px #FFDA90, 0 0 48px #FFB347; }
    }
    
    @keyframes littleSpark {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-5px) rotate(10deg); opacity: 1; }
    }
    @keyframes littleSparkRev {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(4px) rotate(-8deg); opacity: 1; }
    }

    /* heey text — super friendly and prominent */
    .hey-message {
      text-align: center;
      margin-top: 26px;
      z-index: 12;
      width: 100%;
      animation: messageFadeIn 1.8s ease-out forwards;
    }
    @keyframes messageFadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    .hey-big {
      font-size: clamp(2.4rem, 10vw, 3.5rem);
      font-weight: 800;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', cursive;
      background: linear-gradient(125deg, #FFE0C0, #FFB0C0, #FFD3A5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      text-shadow: 0 0 18px rgba(255, 140, 110, 0.5);
      animation: textPop 2s infinite alternate;
      display: inline-block;
      padding: 0 6px;
    }
    .sweet-sub {
      font-size: 0.8rem;
      font-weight: 400;
      color: #FFD9C4;
      margin-top: 8px;
      letter-spacing: 2px;
      background: rgba(20, 8, 18, 0.4);
      backdrop-filter: blur(6px);
      display: inline-block;
      padding: 6px 18px;
      border-radius: 60px;
    }
    
    @keyframes textPop {
      0% { text-shadow: 0 0 4px rgba(255, 170, 130, 0.5); letter-spacing: 2px; }
      100% { text-shadow: 0 0 18px rgba(255, 150, 100, 0.9); letter-spacing: 3px; }
    }
    
    /* interactive ripples (soft, mobile optimized) */
    .touch-ripple {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 140, 0.6) 0%, rgba(255, 120, 90, 0) 70%);
      transform: scale(0);
      animation: rippleFade 0.65s ease-out forwards;
      pointer-events: none;
      z-index: 200;
    }
    @keyframes rippleFade {
      0% { transform: scale(0); opacity: 0.7; }
      100% { transform: scale(3.5); opacity: 0; }
    }
    
    /* mini petal burst */
    .micro-bloom {
      position: fixed;
      pointer-events: none;
      z-index: 180;
      filter: blur(0.4px);
    }
    
    /* mobile first adjustments */
    @media (max-width: 550px) {
      body {
        padding: 12px;
      }
      .flower-stage {
        width: 82vw;
        max-width: 300px;
        height: 82vw;
        max-height: 300px;
      }
      .starlight-core {
        font-size: 24px;
      }
      .hey-big {
        letter-spacing: 2px;
      }
      .sweet-sub {
        font-size: 0.7rem;
      }
    }
    
    /* extra little love note */
    .tiny-grace {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      color: rgba(255, 190, 160, 0.5);
      z-index: 12;
      font-weight: 300;
      letter-spacing: 1px;
      animation: fadeSlideUp 2s ease-out forwards;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    /* no awkward outlines on touch */
    :focus {
      outline: none;
    }
    
    /* additional floating petal animation for realism - subtle sway after bloom */
    @keyframes subtleSway {
      0%, 100% { transform: rotate(var(--angle)) translateY(0px); }
      50% { transform: rotate(calc(var(--angle) + 0.8deg)) translateY(-1.5px); }
    }
    
    .flower.bloom-complete .petal {
      animation: realBloom 2.2s cubic-bezier(0.2, 0.85, 0.25, 1.1) forwards, subtleSway 4s ease-in-out infinite;
      animation-delay: 0s, 2.3s;
    }
  </style>
</head>
<body>
<div class="glow-mist"></div>
<div class="dust-sky" id="dustField"></div>

<div class="sweet-container">
  <div class="flower-stage">
    <div class="flower" id="luxuryFlower"></div>
  </div>
  <div class="hey-message">
    <div class="hey-big">heey MONTAAAA🌸</div>
    <div class="sweet-sub">you make everything bloom</div>
  </div>
  <div class="tiny-grace">✦ tap the flower center ✦</div>
</div>

<script>
  (function initRealFlower() {
    // 🌹 REALISTIC FLOWER GENERATOR (layered + organic)
const layers = [
  { count: 6, radius: 10, scale: 0.6, delay: 0 },     // inner
  { count: 8, radius: 18, scale: 0.8, delay: 0.2 },   // mid
  { count: 10, radius: 26, scale: 1, delay: 0.4 }     // outer
];

let petalIndex = 0;

layers.forEach((layer, layerIndex) => {
  for (let i = 0; i < layer.count; i++) {

    const petal = document.createElement("div");
    petal.className = "petal";

    // 🌪 NOT perfect angle (adds realism)
    const baseAngle = (360 / layer.count) * i;
    const randomOffset = (Math.random() - 0.5) * 15;
    const angle = baseAngle + randomOffset + (layerIndex * 10);

    petal.style.setProperty('--angle', angle + 'deg');

    // 📏 radial positioning (NOT same center)
    const radius = layer.radius + (Math.random() * 4);

    petal.style.top = `calc(50% - ${radius}px)`;
    petal.style.left = `calc(50% - ${radius}px)`;

    // 🌸 scale per layer (depth)
    petal.style.transform = `scale(${layer.scale})`;

    // ⏱ stagger bloom (layered opening)
    const delay = (petalIndex * 0.08) + layer.delay;
    petal.style.animationDelay = delay + "s";

    // 🌿 slight organic variation
    if (Math.random() > 0.7) {
      petal.style.filter = "brightness(1.1)";
    }

    flowerContainer.appendChild(petal);
    petalIndex++;
  }
});
    
    // create petals with realistic bloom animation
    const petalCount = 16;
    
    for (let i = 0; i < petalCount; i++) {
      const petal = document.createElement("div");
      petal.className = "petal";
      
      const angleStep = 360 / petalCount;
      const angle = angleStep * i;
      petal.style.setProperty('--angle', angle + 'deg');
      
      // positioning: all petals radiate from center
      petal.style.top = "24%";
      petal.style.left = "24%";
      
      // staggered bloom timing for realistic sequential opening (like a real flower unfurling)
      // petals bloom in order, creating a wave effect
      const delay = i * 0.095;
      petal.style.animationDelay = delay + "s";
      
      // some petals get extra gentle variation for organic look
      if (i % 5 === 2) {
        petal.style.width = "49%";
        petal.style.height = "53%";
      }
      if (i % 7 === 3) {
        petal.style.background = `radial-gradient(ellipse at 30% 30%, #FFBFCB, #FF7AA5, #D9426C)`;
      }
      
      flowerContainer.appendChild(petal);
    }
    
    // create gorgeous starlight core with delayed reveal (like a flower's center emerging)
    const starCore = document.createElement("div");
    starCore.className = "starlight-core";
    starCore.innerHTML = "🌸";
    starCore.style.animationDelay = "0.8s"; // center appears after petals start opening
    flowerContainer.appendChild(starCore);
    
    // mark flower as bloom-complete after main animation finishes to add subtle sway
    setTimeout(() => {
      flowerContainer.classList.add('bloom-complete');
    }, 2400);
    
    // === INTERACTIVITY : tap on core gives "heey" magic ===
    starCore.addEventListener("click", (e) => {
      e.stopPropagation();
      const rect = starCore.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      // visual & emotional feedback
      createRippleTouch(centerX, centerY, "#FFCFA5");
      burstHeartsAndStars(centerX, centerY);
      floatingHeeyText(centerX, centerY);
      
      // animate the core for playful response
      starCore.style.transform = "scale(0.94) rotate(2deg)";
      setTimeout(() => {
        starCore.style.transform = "";
      }, 150);
      
      // animate "heey" text with extra sweetness
      const heyBig = document.querySelector(".hey-big");
      heyBig.style.animation = "none";
      heyBig.style.transform = "scale(1.1)";
      setTimeout(() => {
        heyBig.style.animation = "textPop 2s infinite alternate";
        heyBig.style.transform = "";
      }, 220);
      
      // subtle subtext change
      const subElem = document.querySelector(".sweet-sub");
      const originalSub = subElem.innerText;
      subElem.innerText = "💕  heey gorgeous  💕";
      subElem.style.opacity = "0.95";
      setTimeout(() => {
        subElem.innerText = originalSub;
      }, 1200);
      
      // extra fun: trigger a tiny confetti of petals
      miniPetalSprinkle(centerX, centerY);
    });
    
    // also clicking flower wrapper (but not center twice) gives subtle delight
    const wrapper = document.querySelector(".flower-stage");
    wrapper.addEventListener("click", (e) => {
      if (e.target === starCore || starCore.contains(e.target)) return;
      const clickX = e.clientX;
      const clickY = e.clientY;
      createRippleTouch(clickX, clickY, "#FFCBA5");
      softPetalShower(clickX, clickY);
    });
    
    // ADDITIONAL REALISM: create a few inner petals that appear slightly later (optional)
    // this gives the feeling of a multi-layered flower opening
    setTimeout(() => {
      const innerPetals = [3, 8, 12];
      innerPetals.forEach(idx => {
        const existingPetals = document.querySelectorAll('.petal');
        if (existingPetals[idx]) {
          existingPetals[idx].style.filter = "brightness(1.08) drop-shadow(0 0 4px #FFC0CB)";
        }
      });
    }, 1000);
    
  })();
  
  // ripple effect for mobile (clean)
  function createRippleTouch(x, y, color = "#FFD4A5") {
    const rippleDiv = document.createElement("div");
    rippleDiv.className = "touch-ripple";
    rippleDiv.style.left = x - 25 + "px";
    rippleDiv.style.top = y - 25 + "px";
    rippleDiv.style.width = "50px";
    rippleDiv.style.height = "50px";
    rippleDiv.style.background = `radial-gradient(circle, ${color} 0%, rgba(255,130,90,0) 75%)`;
    document.body.appendChild(rippleDiv);
    setTimeout(() => {
      if (rippleDiv && rippleDiv.remove) rippleDiv.remove();
    }, 700);
  }
  
  // magical heart & star burst (heey celebration)
  function burstHeartsAndStars(x, y) {
    const icons = ["❤️", "🌸", "✨", "💖", "🌼", "🌺", "⭐"];
    for (let i = 0; i < 22; i++) {
      const charm = document.createElement("div");
      const randomIcon = icons[Math.floor(Math.random() * icons.length)];
      charm.innerHTML = randomIcon;
      charm.style.position = "fixed";
      charm.style.left = x + "px";
      charm.style.top = y + "px";
      charm.style.fontSize = (12 + Math.random() * 16) + "px";
      charm.style.pointerEvents = "none";
      charm.style.zIndex = "210";
      charm.style.opacity = "0.9";
      charm.style.filter = "drop-shadow(0 0 3px #FFBC8C)";
      document.body.appendChild(charm);
      
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.8 + Math.random() * 6.5;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed - 1.5;
      let posX = x, posY = y;
      let life = 1.0;
      let rot = Math.random() * 360;
      
      function flyCharm() {
        if (life <= 0.02 || posY < -60 || posX > window.innerWidth + 100 || posX < -100) {
          if (charm.parentNode) charm.remove();
          return;
        }
        posX += vx;
        posY += vy;
        vy += 0.1;
        life -= 0.017;
        rot += 8;
        charm.style.transform = `translate(${posX - x}px, ${posY - y}px) rotate(${rot}deg)`;
        charm.style.opacity = life * 0.9;
        requestAnimationFrame(flyCharm);
      }
      requestAnimationFrame(flyCharm);
      setTimeout(() => {
        if (charm.parentNode) charm.remove();
      }, 1600);
    }
  }
  
  // floating "heey" word popup sweet
  function floatingHeeyText(x, y) {
    const wordDiv = document.createElement("div");
    const greetings = ["heey ✨", "💕 hey!", "sweet you", "🌸 lovely", "heey 💖"];
    wordDiv.innerText = greetings[Math.floor(Math.random() * greetings.length)];
    wordDiv.style.position = "fixed";
    wordDiv.style.left = x + "px";
    wordDiv.style.top = y + "px";
    wordDiv.style.fontSize = "1.5rem";
    wordDiv.style.fontWeight = "bold";
    wordDiv.style.fontFamily = "'Segoe UI', 'Poppins', cursive";
    wordDiv.style.background = "linear-gradient(125deg, #FFE2BC, #FFBACB)";
    wordDiv.style.webkitBackgroundClip = "text";
    wordDiv.style.backgroundClip = "text";
    wordDiv.style.color = "transparent";
    wordDiv.style.whiteSpace = "nowrap";
    wordDiv.style.pointerEvents = "none";
    wordDiv.style.zIndex = "250";
    wordDiv.style.textShadow = "0 0 12px #FFB080";
    wordDiv.style.backdropFilter = "blur(2px)";
    document.body.appendChild(wordDiv);
    
    let offsetY = 0;
    let opacityVal = 1;
    function riseSweet() {
      offsetY -= 1.8;
      opacityVal -= 0.018;
      if (opacityVal <= 0) {
        if (wordDiv.parentNode) wordDiv.remove();
        return;
      }
      wordDiv.style.transform = `translate(${0}px, ${offsetY}px) scale(${1 + offsetY * 0.008})`;
      wordDiv.style.opacity = opacityVal;
      requestAnimationFrame(riseSweet);
    }
    requestAnimationFrame(riseSweet);
    setTimeout(() => {
      if (wordDiv.parentNode) wordDiv.remove();
    }, 1200);
  }
  
  // mini petal sprinkle (from the core burst)
  function miniPetalSprinkle(x, y) {
    for (let i = 0; i < 14; i++) {
      const petalPiece = document.createElement("div");
      petalPiece.className = "micro-bloom";
      petalPiece.style.width = "9px";
      petalPiece.style.height = "11px";
      petalPiece.style.background = `radial-gradient(circle, #FFAABA, #F8557F)`;
      petalPiece.style.borderRadius = "70% 30% 60% 40% / 55% 45% 55% 45%";
      petalPiece.style.left = x + "px";
      petalPiece.style.top = y + "px";
      petalPiece.style.boxShadow = "0 0 5px #FFA57A";
      document.body.appendChild(petalPiece);
      
      const angle = Math.random() * Math.PI * 2;
      const velocity = 1.4 + Math.random() * 5;
      let dx = Math.cos(angle) * velocity;
      let dy = Math.sin(angle) * velocity - 1.2;
      let posX = 0, posY = 0;
      let life = 1;
      let rotSpiral = Math.random() * 25;
      
      function flyPiece() {
        posX += dx;
        posY += dy;
        dy += 0.1;
        life -= 0.023;
        if (life <= 0 || posY > 280 || Math.abs(posX) > 260) {
          if (petalPiece.parentNode) petalPiece.remove();
          return;
        }
        petalPiece.style.transform = `translate(${posX}px, ${posY}px) rotate(${rotSpiral + posX}deg)`;
        petalPiece.style.opacity = life * 0.8;
        requestAnimationFrame(flyPiece);
      }
      requestAnimationFrame(flyPiece);
      setTimeout(() => {
        if (petalPiece.parentNode) petalPiece.remove();
      }, 1000);
    }
  }
  
  function softPetalShower(x, y) {
    for (let i = 0; i < 10; i++) {
      const leaflet = document.createElement("div");
      leaflet.className = "micro-bloom";
      leaflet.style.width = "8px";
      leaflet.style.height = "10px";
      leaflet.style.background = `radial-gradient(circle, #FFB5C2, #E65079)`;
      leaflet.style.borderRadius = "60% 40% 65% 35% / 50% 45% 55% 45%";
      leaflet.style.left = x + "px";
      leaflet.style.top = y + "px";
      document.body.appendChild(leaflet);
      
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4.5;
      let dx = Math.cos(angle) * speed;
      let dy = Math.sin(angle) * speed - 1;
      let posX = 0, posY = 0;
      let life = 1;
      function moveLeaf() {
        posX += dx;
        posY += dy;
        dy += 0.08;
        life -= 0.025;
        if (life <= 0 || Math.abs(posY) > 200) {
          if (leaflet.parentNode) leaflet.remove();
          return;
        }
        leaflet.style.transform = `translate(${posX}px, ${posY}px) rotate(${posX}deg)`;
        leaflet.style.opacity = life * 0.7;
        requestAnimationFrame(moveLeaf);
      }
      requestAnimationFrame(moveLeaf);
      setTimeout(() => leaflet.remove(), 900);
    }
  }
  
  // floating dust field (mobile friendly)
  function initDustField() {
    const dustContainer = document.getElementById("dustField");
    if (!dustContainer) return;
    const dustCount = 55;
    for (let i = 0; i < dustCount; i++) {
      const dust = document.createElement("div");
      dust.classList.add("dustie");
      const size = 2 + Math.random() * 5;
      dust.style.width = size + "px";
      dust.style.height = size + "px";
      dust.style.left = Math.random() * 100 + "%";
      dust.style.animationDuration = 4 + Math.random() * 15 + "s";
      dust.style.animationDelay = Math.random() * 12 + "s";
      dust.style.opacity = 0.2 + Math.random() * 0.45;
      dust.style.background = `radial-gradient(circle, #FFCFB5, #FFA7B8)`;
      dustContainer.appendChild(dust);
    }
    // gentle floating mini hearts occasionally
    setInterval(() => {
      if (document.hidden) return;
      const driftHeart = document.createElement("div");
      driftHeart.innerHTML = "✧";
      driftHeart.style.position = "fixed";
      driftHeart.style.left = Math.random() * 100 + "%";
      driftHeart.style.bottom = "-15px";
      driftHeart.style.fontSize = "12px";
      driftHeart.style.color = `rgba(255, 190, 165, 0.5)`;
      driftHeart.style.pointerEvents = "none";
      driftHeart.style.zIndex = "3";
      driftHeart.style.animation = `floatGentle 10s linear forwards`;
      driftHeart.style.opacity = "0.5";
      document.body.appendChild(driftHeart);
      setTimeout(() => driftHeart.remove(), 10000);
    }, 3400);
  }
  
  const styleFloat = document.createElement('style');
  styleFloat.textContent = `
    @keyframes floatGentle {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-100vh) rotate(12deg); opacity: 0; }
    }
  `;
  document.head.appendChild(styleFloat);
  
  // random petal shimmer periodically (after bloom)
  setInterval(() => {
    const petals = document.querySelectorAll('.petal');
    if (!petals.length) return;
    const randomPetal = petals[Math.floor(Math.random() * petals.length)];
    if (randomPetal) {
      randomPetal.style.filter = "brightness(1.15) drop-shadow(0 0 5px #FFB28C)";
      setTimeout(() => {
        if (randomPetal) randomPetal.style.filter = "";
      }, 350);
    }
  }, 1900);
  
  window.addEventListener('load', () => {
    initDustField();
    // welcome touch: tiny heey greeting pop after load, once flower has started blooming
    setTimeout(() => {
      const core = document.querySelector('.starlight-core');
      if (core) {
        const rect = core.getBoundingClientRect();
        const x = rect.left + rect.width/2;
        const y = rect.top + rect.height/2;
        floatingHeeyText(x, y);
      }
    }, 1200);
  });
</script>
</body>
