<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Flower</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #0b0b0f, #000000);
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Soft luxury particles */
  body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: moveBg 40s linear infinite;
  }

  @keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-60px,-60px); }
  }

  .flower {
    position: relative;
    width: 260px;
    height: 260px;
  }

  .petal {
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    transform-origin: bottom right;
    opacity: 0;

    background: radial-gradient(circle at 30% 30%, #8b0000, #2b0000);
    box-shadow:
      0 0 25px rgba(139, 0, 0, 0.6),
      inset 0 0 20px rgba(0,0,0,0.7);

    animation: bloom 2.5s ease-out forwards;
  }

  .center {
    position: absolute;
    width: 70px;
    height: 70px;
    top: 95px;
    left: 95px;
    border-radius: 50%;
    z-index: 2;

    background: radial-gradient(circle, #ffd700, #b8860b);
    box-shadow:
      0 0 30px rgba(255,215,0,0.9),
      0 0 60px rgba(255,215,0,0.4);

    animation: pulse 3s ease-in-out infinite;
  }

  /* subtle shine overlay */
  .center::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent);
  }

  @keyframes bloom {
    0% {
      transform: scale(0) rotate(0deg);
      opacity: 0;
      filter: blur(5px);
    }
    100% {
      transform: scale(1) rotate(var(--angle));
      opacity: 1;
      filter: blur(0);
    }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* romantic text (optional) */
  .text {
    position: absolute;
    bottom: 40px;
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>

</head>
<body>

<div class="flower" id="flower"></div>
<div class="text">For You</div>

<script>
  const flower = document.getElementById("flower");
  const petalCount = 14;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement("div");
    petal.className = "petal";

    const angle = (360 / petalCount) * i;
    petal.style.setProperty('--angle', angle + 'deg');

    petal.style.top = "65px";
    petal.style.left = "65px";

    // slow luxury animation delay
    petal.style.animationDelay = (i * 0.15) + "s";

    flower.appendChild(petal);
  }

  const center = document.createElement("div");
  center.className = "center";
  flower.appendChild(center);
</script>

</body>
</html>
